name: Emergency Release Cleanup

# 适配 Node.js 24
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
    inputs:
      target_tag:
        description: '目标发布标签 (Target Release Tag)'
        required: true
        type: string
      issue_type:
        description: '问题类型 (Issue Type)'
        required: true
        type: choice
        options:
          - Normal
          - Bug
          - Critical
      reference:
        description: '问题链接或说明 (Issue link or description, optional)'
        required: false
        type: string

jobs:
  cleanup:
    runs-on: ubuntu-latest
    # 仅允许仓库所有者执行
    if: github.actor == github.repository_owner

    steps:
      # ==================== 验证发布是否存在 ====================
      - name: 验证 Release 存在
        run: |
          if ! gh release view "${{ inputs.target_tag }}" --repo ${{ github.repository }} > /dev/null 2>&1; then
            echo "::error::Release '${{ inputs.target_tag }}' 不存在"
            exit 1
          fi
          echo "✅ 找到 Release: ${{ inputs.target_tag }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ==================== 获取原始发布信息 ====================
      - name: 获取原始发布信息
        id: info
        run: |
          gh release view "${{ inputs.target_tag }}" --repo ${{ github.repository }} \
            --json name,body,isPrerelease > release_info.json

          jq -r '.name' release_info.json > original_title.txt
          jq -r '.body' release_info.json > original_body.txt

          IS_PRERELEASE=$(jq -r '.isPrerelease' release_info.json)
          echo "is_prerelease=$IS_PRERELEASE" >> $GITHUB_OUTPUT

          echo "📋 原标题: $(cat original_title.txt)"
          echo "📋 Pre-release: $IS_PRERELEASE"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ==================== 处理 Normal 类型 ====================
      - name: 处理 Normal 类型 - 标记正常
        if: inputs.issue_type == 'Normal'
        run: |
          cat > new_body.md << 'EOF'
          > [!TIP]
          > **此版本已验证，可正常使用。**
          >
          > **This release has been verified and is safe to use.**
          EOF

          sed -i 's/^          //' new_body.md

          if [ -n "${{ inputs.reference }}" ]; then
            echo "" >> new_body.md
            echo "**参考 / Reference**: ${{ inputs.reference }}" >> new_body.md
          fi

          echo "" >> new_body.md
          echo "---" >> new_body.md
          echo "" >> new_body.md
          cat original_body.txt >> new_body.md

          gh release edit "${{ inputs.target_tag }}" --repo ${{ github.repository }} \
            --notes-file new_body.md

          echo "✅ 已标记 Release 为正常 (Normal)"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ==================== 处理 Bug 类型 ====================
      - name: 处理 Bug 类型
        if: inputs.issue_type == 'Bug'
        run: |
          cat > new_body.md << 'EOF'
          > [!WARNING]
          > **此版本存在已知 Bug，建议谨慎使用。**
          >
          > **This release contains known bugs, use with caution.**
          EOF

          sed -i 's/^          //' new_body.md

          if [ -n "${{ inputs.reference }}" ]; then
            echo "" >> new_body.md
            echo "**参考 / Reference**: ${{ inputs.reference }}" >> new_body.md
          fi

          echo "" >> new_body.md
          echo "---" >> new_body.md
          echo "" >> new_body.md
          cat original_body.txt >> new_body.md

          gh release edit "${{ inputs.target_tag }}" --repo ${{ github.repository }} \
            --notes-file new_body.md

          echo "✅ 已更新 Release 说明 (Bug)"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ==================== 处理 Critical 类型 ====================
      - name: 处理 Critical 类型 - 删除并重建
        if: inputs.issue_type == 'Critical'
        run: |
          ORIGINAL_TITLE=$(cat original_title.txt)

          # 构建警告信息
          cat > new_body.md << 'EOF'
          > [!CAUTION]
          > **本次发布的资源包含导致死机的严重 Bug，所有附件已被清除！**
          >
          > **请勿使用此版本，等待修复版本发布。**
          >
          > **This release contained a critical bug causing device crashes. All assets have been removed!**
          >
          > **DO NOT use this version. Please wait for a fixed release.**
          EOF

          sed -i 's/^          //' new_body.md

          if [ -n "${{ inputs.reference }}" ]; then
            echo "" >> new_body.md
            echo "**参考 / Reference**: ${{ inputs.reference }}" >> new_body.md
          fi

          echo "" >> new_body.md
          echo "---" >> new_body.md
          echo "" >> new_body.md
          cat original_body.txt >> new_body.md

          # 删除 Release（保留 Git Tag）
          echo "🗑️ 删除原 Release..."
          gh release delete "${{ inputs.target_tag }}" --repo ${{ github.repository }} --yes

          # 确定 prerelease 标志
          PRERELEASE_FLAG=""
          if [ "${{ steps.info.outputs.is_prerelease }}" == "true" ]; then
            PRERELEASE_FLAG="--prerelease"
          fi

          # 重建 Release（不上传任何文件）
          echo "🔄 重建 Release..."
          gh release create "${{ inputs.target_tag }}" --repo ${{ github.repository }} \
            --title "$ORIGINAL_TITLE" \
            --notes-file new_body.md \
            $PRERELEASE_FLAG

          echo "✅ 已清除所有附件并重建 Release (Critical)"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ==================== 完成通知 ====================
      - name: 完成
        run: |
          echo "=========================================="
          echo "🎯 目标标签: ${{ inputs.target_tag }}"
          echo "📌 问题类型: ${{ inputs.issue_type }}"
          echo "📝 参考信息: ${{ inputs.reference || '无' }}"
          echo "=========================================="
          echo "✅ 紧急清理完成！"
