name: build-custom

on:
  workflow_dispatch:
    inputs:
      # Optional: prefer a pre-composed feature_set string; if empty the booleans below are used
      enable_ksun:
        description: "Enable KernelSU"
        type: boolean
        required: false
        default: true
      enable_susfs:
        description: "Enable SUSFS"
        type: boolean
        required: false
        default: false
      enable_bbg:
        description: "Enable BBG"
        type: boolean
        required: false
        default: true
      enable_net:
        description: "Enable NET"
        type: boolean
        required: false
        default: true
      enable_ds:
        description: "Enable DS"
        type: boolean
        required: false
        default: false
      # Kernel selection defaults to android14-6.1 sublevel 162 (2026-03)
      version:
        description: "version"
        type: string
        required: false
        default: "android14-6.1"
      android_version:
        description: "Android version"
        type: string
        required: false
        default: "android14"
      kernel_version:
        description: "Kernel Version"
        type: string
        required: false
        default: "6.1"
      sublevel:
        description: "Sublevel"
        type: string
        required: false
        default: "162"
      os_patch_level:
        description: "OS patch level"
        type: string
        required: false
        default: "2026-03"
      ksu_branch:
        description: "KernelSU (empty = main branch)"
        type: string
        required: false
        default: ""
      susfs_commit:
        description: "SUSFS commit (empty = latest branch)"
        type: string
        required: false
        default: ""

jobs:
  compute-feature-set:
    name: Compute feature_set from toggles
    runs-on: ubuntu-latest
    outputs:
      feature_set: ${{ steps.set.outputs.feature_set }}
    steps:
      - name: Compute feature_set
        id: set
        shell: bash
        run: |
          set -euo pipefail
          # If user provided a feature_set string, use it.
          if [ -n "${{ github.event.inputs.feature_set }}" ]; then
            fs="${{ github.event.inputs.feature_set }}"
          else
            parts=()
            if [ "${{ github.event.inputs.enable_ksun }}" = "true" ]; then parts+=(KSUN); fi
            if [ "${{ github.event.inputs.enable_susfs }}" = "true" ]; then parts+=(SUSFS); fi
            if [ "${{ github.event.inputs.enable_bbg }}" = "true" ]; then parts+=(BBG); fi
            if [ "${{ github.event.inputs.enable_net }}" = "true" ]; then parts+=(NET); fi
            if [ "${{ github.event.inputs.enable_ds }}" = "true" ]; then parts+=(DS); fi
            if [ ${#parts[@]} -eq 0 ]; then
              fs="NONE"
            else
              fs=$(IFS=+; echo "${parts[*]}")
            fi
          fi
          echo "feature_set=$fs" >> "$GITHUB_OUTPUT"

  build-single:
    name: Run single build (calls existing build.yml)
    needs: compute-feature-set
    uses: ./.github/workflows/build.yml
    with:
      version: ${{ github.event.inputs.version }}
      android_version: ${{ github.event.inputs.android_version }}
      kernel_version: ${{ github.event.inputs.kernel_version }}
      sublevel: ${{ github.event.inputs.sublevel }}
      os_patch_level: ${{ github.event.inputs.os_patch_level }}
      variant: ${{ github.event.inputs.variant }}
      feature_set: ${{ needs.compute-feature-set.outputs.feature_set }}
      ksu_branch: ${{ github.event.inputs.ksu_branch }}
      susfs_commit: ${{ github.event.inputs.susfs_commit }}
    secrets: inherit
