name: Setup ReSukiSU
description: Download and configure ReSukiSU with version tracking
inputs:
  ksu_branch:
    description: 'ReSukiSU branch or commit (empty = latest main branch tip)'
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Download ReSukiSU
      shell: bash
      working-directory: ${{ github.workspace }}/kernel
      run: |
        set -euo pipefail

        RESUKISU_REPO="https://github.com/ReSukiSU/ReSukiSU.git"
        RESUKISU_INPUT="${{ inputs.ksu_branch }}"
        if [ -z "$RESUKISU_INPUT" ]; then
          RESUKISU_INPUT="main"
        fi

        # Try as branch first, fall back to commit
        if git ls-remote --heads "$RESUKISU_REPO" "$RESUKISU_INPUT" | grep -q .; then
          echo "Using ReSukiSU branch: $RESUKISU_INPUT"
          curl -LSs "https://raw.githubusercontent.com/ReSukiSU/ReSukiSU/main/kernel/setup.sh" | bash -s main
          git -C KernelSU/kernel fetch --depth=50 origin "$RESUKISU_INPUT"
          git -C KernelSU/kernel checkout "origin/$RESUKISU_INPUT"
        else
          echo "Using ReSukiSU commit: $RESUKISU_INPUT"
          curl -LSs "https://raw.githubusercontent.com/ReSukiSU/ReSukiSU/main/kernel/setup.sh" | bash -s main
          git -C KernelSU/kernel fetch --depth=50 origin "$RESUKISU_INPUT"
          git -C KernelSU/kernel checkout "$RESUKISU_INPUT"
        fi

        cd KernelSU/kernel

        git add .
        git commit -m "Apply ReSukiSU kernel integration"
        
        COMMITS_COUNT=$(/usr/bin/git rev-list --count HEAD)
        BASE_VERSION=30000
        RESUKISU_VERSION=$(expr $COMMITS_COUNT "+" $BASE_VERSION)
        sed -i "s/^KSU_VERSION_FALLBACK := 1$/KSU_VERSION_FALLBACK := ${RESUKISU_VERSION}/" Kbuild

        RESUKISU_GIT_TAG="$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.1")"
        sed -i "s/^KSU_VERSION_TAG_FALLBACK := v0.0.1$/KSU_VERSION_TAG_FALLBACK := ${RESUKISU_GIT_TAG}/" Kbuild
    
    - name: Extract ReSukiSU Version Info
      id: resukisu-version
      shell: bash
      working-directory: ${{ github.workspace }}/kernel/KernelSU
      run: |
        # Fetch main branch for version info (tags, commits, etc.)
        git fetch --depth=50 origin main 2>/dev/null || true
        
        # Extract and export ReSukiSU version info from main branch
        RESUKISU_GIT_VERSION=$(git rev-list --count origin/main 2>/dev/null)
        RESUKISU_GIT_TAG=$(git describe --tags --abbrev=0 origin/main 2>/dev/null || echo "")
        RESUKISU_COMMIT=$(git rev-parse --short origin/main 2>/dev/null)
        RESUKISU_VERSION=$((30000 + RESUKISU_GIT_VERSION))
        
        echo "RESUKISU_GIT_TAG=$RESUKISU_GIT_TAG" >> $GITHUB_ENV
        echo "RESUKISU_VERSION=$RESUKISU_VERSION" >> $GITHUB_ENV
        echo "RESUKISU_COMMIT=$RESUKISU_COMMIT" >> $GITHUB_ENV

    - name: Enable Kernel Configs
      uses: ./.github/actions/set-kernel-config
      with:
        config_list: |
          CONFIG_KSU=y
