name: 'Apply Kernel Branding & Timestamp'
description: 'Apply kernel branding to kernel version string'

inputs:
  variant:
    required: true
  kernel_version:
    required: true
  android_version:
    required: true
  version:
    required: true
  sublevel:
    required: true

runs:
  using: composite
  steps:
    - name: Apply Kernel Name Branding
      shell: bash
      working-directory: ${{ github.workspace }}/kernel/common
      run: |
        VERSION="${{ inputs.version }}"
        ANDROID_PART=$(echo "$VERSION" | cut -d- -f1)
        KERNEL_PART=$(echo "$VERSION" | cut -d- -f2)

        # KMI tag
        case "$VERSION" in
          android14-6.1)  KMI_TAG="11" ;;
          android15-6.6)  KMI_TAG="8" ;;
          android16-6.12) KMI_TAG="5" ;;
          *) KMI_TAG="" ;;
        esac

        # Git hash (13 chars)
        GHASH=$(git rev-parse --short=13 HEAD)

        # Build ID (replace with your preferred source if desired)
        BUILD_ID="ab$(printf "%08d" $((RANDOM << 15 | RANDOM)))"

        if [[ "$VERSION" == "android15-6.6" || "$VERSION" == "android16-6.12" ]]; then
          KERNEL_STRING="${KERNEL_PART}.${{ inputs.sublevel }}-${ANDROID_PART}-${KMI_TAG}-g${GHASH}-${BUILD_ID}"
        else
          KERNEL_STRING="-${ANDROID_PART}-${KMI_TAG}-g${GHASH}-${BUILD_ID}"
        fi

        sed -i '$d' scripts/setlocalversion
        echo "echo \"$KERNEL_STRING\"" >> scripts/setlocalversion

        chmod +x scripts/setlocalversion
